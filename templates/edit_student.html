{% extends "base.html" %}
{% block title %}Edit Student – Vision Academy{% endblock %}
{% block page_title %}Edit Student{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Edit Student: {{ student.name }}</h2>
  <a href="{{ url_for('students') }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('edit_student', sid=student.id) }}" novalidate>
    <div class="form-grid two-col">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" required value="{{ student.name }}"/>
      </div>
      <div class="form-group">
        <label>Roll Number (read-only)</label>
        <input type="text" value="{{ student.roll_no }}" disabled/>
      </div>
      <div class="form-group">
        <label>Standard *</label>
        <select name="standard" required>
          {% for s in standards %}
          <option value="{{ s }}" {% if s==student.standard %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Medium</label>
        <select name="medium">
          <option value="English" {% if student.medium=='English' %}selected{% endif %}>English</option>
          <option value="Marathi" {% if student.medium=='Marathi' %}selected{% endif %}>Marathi</option>
        </select>
      </div>
      <div class="form-group">
        <label>Stream</label>
        <select name="stream">
          <option value="">N/A</option>
          <option value="Science" {% if student.stream=='Science' %}selected{% endif %}>Science</option>
          <option value="Commerce" {% if student.stream=='Commerce' %}selected{% endif %}>Commerce</option>
          <option value="Arts" {% if student.stream=='Arts' %}selected{% endif %}>Arts</option>
        </select>
      </div>
      <div class="form-group">
        <label>Parent / Guardian Name</label>
        <input type="text" name="parent_name" value="{{ student.parent_name or '' }}"/>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" name="contact" value="{{ student.contact or '' }}"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" value="{{ student.email or '' }}"/>
      </div>
      <div class="form-group full-span">
        <label>Address</label>
        <textarea name="address" rows="2">{{ student.address or '' }}</textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Update Student</button>
      <a href="{{ url_for('students') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
