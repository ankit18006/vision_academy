{% extends "base.html" %}
{% block title %}Add Student – Vision Academy{% endblock %}
{% block page_title %}Add Student{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Add New Student</h2>
  <a href="{{ url_for('students') }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_student') }}" novalidate>
    <div class="form-grid two-col">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" required placeholder="Student's full name"/>
      </div>
      <div class="form-group">
        <label>Roll Number *</label>
        <input type="text" name="roll_no" required placeholder="e.g. VA2024001"/>
      </div>
      <div class="form-group">
        <label>Standard *</label>
        <select name="standard" required>
          <option value="">Select Standard</option>
          {% for s in standards %}
          <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Medium</label>
        <select name="medium">
          <option value="English">English</option>
          <option value="Marathi">Marathi</option>
        </select>
      </div>
      <div class="form-group">
        <label>Stream (11th/12th only)</label>
        <select name="stream">
          <option value="">N/A</option>
          <option value="Science">Science</option>
          <option value="Commerce">Commerce</option>
          <option value="Arts">Arts</option>
        </select>
      </div>
      <div class="form-group">
        <label>Admission Date</label>
        <input type="date" name="admission_date"/>
      </div>
      <div class="form-group">
        <label>Parent / Guardian Name</label>
        <input type="text" name="parent_name" placeholder="Parent's name"/>
      </div>
      <div class="form-group">
        <label>Contact Number</label>
        <input type="text" name="contact" placeholder="Mobile number"/>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="Email (optional)"/>
      </div>
      <div class="form-group full-span">
        <label>Address</label>
        <textarea name="address" rows="2" placeholder="Full address"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Student</button>
      <a href="{{ url_for('students') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
