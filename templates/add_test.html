{% extends "base.html" %}
{% block title %}Schedule Test – Vision Academy{% endblock %}
{% block page_title %}Schedule Test{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Schedule New Test</h2>
  <a href="{{ url_for('tests') }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_test') }}" novalidate>
    <div class="form-grid two-col">
      <div class="form-group full-span">
        <label>Test Title *</label>
        <input type="text" name="title" required placeholder="e.g. Unit Test 1 – Mathematics"/>
      </div>
      <div class="form-group">
        <label>Subject *</label>
        <input type="text" name="subject" required placeholder="Subject name"/>
      </div>
      <div class="form-group">
        <label>Standard *</label>
        <select name="standard" required>
          <option value="">Select Standard</option>
          {% for s in standards %}
          <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Test Date *</label>
        <input type="date" name="test_date" required/>
      </div>
      <div class="form-group">
        <label>Total Marks *</label>
        <input type="number" name="total_marks" required min="1" placeholder="e.g. 100"/>
      </div>
      <div class="form-group full-span">
        <label>Description / Instructions</label>
        <textarea name="description" rows="3" placeholder="Optional notes about this test…"></textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Schedule Test</button>
      <a href="{{ url_for('tests') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
