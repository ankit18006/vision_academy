{% extends "base.html" %}
{% block title %}Assign Homework – Vision Academy{% endblock %}
{% block page_title %}Assign Homework{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Assign Homework</h2>
  <a href="{{ url_for('homework') }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_homework') }}" novalidate>
    <div class="form-grid two-col">
      <div class="form-group">
        <label>Student *</label>
        <select name="student_id" required>
          <option value="">Select Student</option>
          {% for s in students %}
          <option value="{{ s.id }}">{{ s.name }} ({{ s.roll_no }} – Std {{ s.standard }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Subject *</label>
        <input type="text" name="subject" required placeholder="e.g. Mathematics"/>
      </div>
      <div class="form-group full-span">
        <label>Homework Title *</label>
        <input type="text" name="title" required placeholder="Title of the assignment"/>
      </div>
      <div class="form-group full-span">
        <label>Description</label>
        <textarea name="description" rows="3" placeholder="Detailed instructions…"></textarea>
      </div>
      <div class="form-group">
        <label>Due Date *</label>
        <input type="date" name="due_date" required/>
      </div>
      <div class="form-group">
        <label>Assigned By</label>
        <input type="text" name="assigned_by" placeholder="Teacher name" value="{{ current_user.name }}"/>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Assign Homework</button>
      <a href="{{ url_for('homework') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
