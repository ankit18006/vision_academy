{% extends "base.html" %}
{% block title %}Add Result – Vision Academy{% endblock %}
{% block page_title %}Add Result{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Enter Test Result</h2>
  <a href="{{ url_for('results') }}" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back</a>
</div>
<div class="form-card">
  <form method="POST" action="{{ url_for('add_result') }}" novalidate>
    <div class="form-grid two-col">
      <div class="form-group">
        <label>Student *</label>
        <select name="student_id" required>
          <option value="">Select Student</option>
          {% for s in students %}
          <option value="{{ s.id }}">{{ s.name }} ({{ s.roll_no }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Test *</label>
        <select name="test_id" required>
          <option value="">Select Test</option>
          {% for t in tests %}
          <option value="{{ t.id }}">{{ t.title }} – {{ t.subject }} ({{ t.test_date.strftime('%d %b') }}, /{{ t.total_marks }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Marks Obtained *</label>
        <input type="number" name="marks_obtained" required min="0" step="0.5" placeholder="Marks scored"/>
      </div>
      <div class="form-group">
        <label>Remarks</label>
        <input type="text" name="remarks" placeholder="Optional teacher remarks"/>
      </div>
    </div>
    <div class="info-box"><i class="fas fa-info-circle"></i> Grade will be auto-calculated from percentage.</div>
    <div class="form-actions">
      <button type="submit" class="btn-primary"><i class="fas fa-save"></i> Save Result</button>
      <a href="{{ url_for('results') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
